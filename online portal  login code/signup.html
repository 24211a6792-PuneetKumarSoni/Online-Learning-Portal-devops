<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pathshala – Student Sign Up</title>
  <meta name="description" content="Create a new Pathshala student account with your BVRIT email."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="login-wrapper" style="justify-content:center; align-items:center; padding:40px 16px;">
    <div class="login-card" style="max-width:500px; width:100%;">

      <!-- Brand -->
      <div class="mobile-brand" style="display:flex; margin-bottom:20px;">
        <div class="brand-icon small">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <span class="brand-name">Pathshala</span>
      </div>

      <h2 class="card-title">Create Account</h2>
      <p class="card-subtitle">Register with your <strong>@bvrit.ac.in</strong> student email</p>

      <!-- SIGNUP FORM -->
      <form id="signup-form" onsubmit="handleSignup(event)" novalidate>

        <div class="form-group">
          <label for="full-name">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="full-name" name="fullName" placeholder="Your full name" required/>
          </div>
          <span class="field-error" id="full-name-error"></span>
        </div>

        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="signup-email" name="email" placeholder="yourname@bvrit.ac.in" required/>
          </div>
          <span class="field-error" id="signup-email-error"></span>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="signup-password" name="password" placeholder="Min. 6 characters" required/>
          </div>
          <span class="field-error" id="signup-password-error"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirm-password" name="confirmPassword" placeholder="Repeat password" required/>
          </div>
          <span class="field-error" id="confirm-password-error"></span>
        </div>

        <!-- Error / Success alerts -->
        <div class="alert alert-error" id="signup-error" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span id="signup-error-text">Registration failed.</span>
        </div>
        <div class="alert alert-success" id="signup-success" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span>Account created! Redirecting to login…</span>
        </div>

        <button type="submit" class="btn-login" id="btn-signup">
          <span id="signup-btn-label">Create Account</span>
          <div class="spinner" id="signup-spinner" style="display:none;"></div>
        </button>
      </form>

      <p class="signup-link" style="margin-top:18px;">
        Already have an account? <a href="index.html">Sign In</a>
      </p>
    </div>
  </main>

  <script src="signup.js"></script>
</body>
</html>
